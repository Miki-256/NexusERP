name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Unit test coverage (lib/api)
        run: npm run test:unit:coverage

      - name: STABLE/VOLATILE RPC audit
        run: npm run audit:stable-rpcs

      - name: RLS org-access audit
        run: npm run audit:rls

      - name: API route auth audit
        run: npm run audit:api-auth

      - name: Financials area-scope audit
        run: npm run audit:financials-scope

      - name: E2E spec audit
        run: npm run audit:e2e

      - name: Module E2E coverage audit
        run: npm run audit:module-e2e

      - name: Launch ops audit
        run: npm run audit:launch-ops

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-key

  production-env:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Production environment checklist
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Skipping production env check — set NEXT_PUBLIC_SUPABASE_URL on main."
            exit 0
          fi
          CHECK_PRODUCTION_ENV=1 npm run verify:production-env
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          POS_WEBHOOK_SECRET: ${{ secrets.POS_WEBHOOK_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_FROM_EMAIL: ${{ secrets.NOTIFICATION_FROM_EMAIL }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke E2E
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "ERROR: E2E_EMAIL secret required on main branch."
              exit 1
            fi
            echo "Skipping E2E on PR — set E2E_EMAIL repo secret to enable."
            exit 0
          fi
          npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_STAFF_PIN: ${{ secrets.E2E_STAFF_PIN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  verify-supabase:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Verify remote Supabase RPCs
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "ERROR: NEXT_PUBLIC_SUPABASE_URL secret required on main branch."
              exit 1
            fi
            echo "Skipping Supabase verify on PR — set NEXT_PUBLIC_SUPABASE_URL to enable."
            exit 0
          fi
          npm run verify:supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: RPC integration tests
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "ERROR: E2E_EMAIL secret required on main branch for integration tests."
              exit 1
            fi
            echo "Skipping integration tests on PR — set E2E_EMAIL to enable."
            exit 0
          fi
          npm run test:integration
        env:
          INTEGRATION_TEST_EMAIL: ${{ secrets.E2E_EMAIL }}
          INTEGRATION_TEST_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
